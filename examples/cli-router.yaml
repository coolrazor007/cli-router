version: 1

defaults:
  plan_file: PLAN.md
  run_dir: .cli-router/runs
  stop_on_failure: true

tools:
  planner:
    type: generic
    command:
      - python
      - -c
      - "import sys; print(sys.argv[1])"
      - "{prompt}"
    output:
      format: text

  coder:
    type: generic
    command:
      - python
      - -c
      - "import sys; print(sys.argv[1])"
      - "{prompt}"
    output:
      format: text

workflows:
  default:
    stages:
      - id: planner
        tool: planner
        input_template: |
          Create an implementation plan for:
          {user_prompt}
        output_file: PLAN.md

      - id: coder
        tool: coder
        input_template: |
          Implement {plan_path}.

          Original request:
          {user_prompt}
