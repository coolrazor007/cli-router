version: 2
requires_cli_router: ">=0.3.1,<0.4.0"

defaults:
  plan_file: PLAN.md
  run_dir: .cli-router/runs
  stop_on_failure: true
  tui_verbosity: condensed

tools:
  planner:
    type: generic
    command:
      - python
      - -c
      - "import sys; print(sys.argv[1])"
      - "{prompt}"
    output:
      format: text

  coder:
    type: generic
    command:
      - python
      - -c
      - "import sys; print(sys.argv[1])"
      - "{prompt}"
    output:
      format: text

  reviewer:
    type: generic
    command:
      - python
      - -c
      - "import sys; print('Review: ' + sys.argv[1])"
      - "{prompt}"
    output:
      format: text

workflows:
  default:
    stages:
      - id: planner
        tool: planner
        input_template: |
          Create an implementation plan for:
          {user_prompt}
        output_file: PLAN.md

      - id: coder
        tool: coder
        input_template: |
          Implement {plan_path}.

          Original request:
          {user_prompt}

      - id: review
        tool: reviewer
        enabled: false
        input_template: |
          Review the result against {plan_path}.

          Original request:
          {user_prompt}
